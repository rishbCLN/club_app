name: nexus
description: NEXUS — College Club Hub. Dark bioluminescent social platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.10
  firebase_messaging: ^14.7.19

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^12.1.3

  # Animations
  flutter_animate: ^4.5.0

  # UI
  google_fonts: ^6.2.1
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0

  # Utils
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  share_plus: ^7.2.2
  hive_flutter: ^1.1.0
  intl: ^0.18.1
  equatable: ^2.0.5
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.2
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
